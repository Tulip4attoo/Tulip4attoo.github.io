<!DOCTYPE html>
<html data-theme="dark" data-default-theme="dark">

  {% include head.html %}

  <body class="home-landing">
    <div class="home-sky" aria-hidden="true">
      <svg class="home-constellations" viewBox="0 0 1440 900" preserveAspectRatio="none">
        <g class="constellation constellation-a">
          <circle cx="98" cy="576" r="1.8" />
          <circle cx="150" cy="550" r="1.4" />
          <circle cx="222" cy="610" r="1.7" />
          <circle cx="270" cy="580" r="1.2" />
          <polyline points="98,576 150,550 222,610 270,580" />
        </g>
        <g class="constellation constellation-b">
          <circle cx="330" cy="314" r="1.6" />
          <circle cx="382" cy="278" r="1.4" />
          <circle cx="430" cy="330" r="1.9" />
          <circle cx="432" cy="374" r="1.3" />
          <polyline points="330,314 382,278 430,330 432,374" />
          <polyline points="330,314 430,330" />
        </g>
        <g class="constellation constellation-c">
          <circle cx="585" cy="82" r="1.4" />
          <circle cx="640" cy="48" r="1.8" />
          <circle cx="690" cy="114" r="1.3" />
          <circle cx="712" cy="180" r="1.8" />
          <circle cx="742" cy="208" r="1.4" />
          <polyline points="585,82 640,48 690,114 712,180 742,208" />
        </g>
        <g class="constellation constellation-d">
          <circle cx="1048" cy="134" r="1.2" />
          <circle cx="1110" cy="198" r="1.7" />
          <circle cx="1175" cy="188" r="1.4" />
          <circle cx="1226" cy="232" r="1.6" />
          <polyline points="1048,134 1110,198 1175,188 1226,232" />
          <polyline points="1110,198 1162,248 1226,232" />
        </g>
        <g class="constellation constellation-e">
          <circle cx="1168" cy="628" r="1.8" />
          <circle cx="1224" cy="604" r="1.2" />
          <circle cx="1274" cy="652" r="1.5" />
          <circle cx="1212" cy="704" r="1.7" />
          <polyline points="1168,628 1224,604 1274,652 1212,704 1168,628" />
        </g>
        <g class="constellation constellation-f">
          <circle cx="548" cy="640" r="1.7" />
          <circle cx="604" cy="676" r="1.4" />
          <circle cx="668" cy="648" r="1.2" />
          <polyline points="548,640 604,676 668,648" />
        </g>
      </svg>
    </div>

    <button id="theme-toggle" class="home-theme-toggle" title="Toggle theme" aria-label="Toggle theme">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>

    <main class="home-main">
      {{ content }}
    </main>

    <script src="{{ '/assets/js/theme-switcher.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/home-landing.js' | relative_url }}" defer></script>
  </body>
</html>
